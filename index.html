<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#07162f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="私•話">
  <title>私•話</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="app-shell">
    <section class="setup-card" id="setupView">
      <div class="setup-head">
        <div class="logo-mark">私•話</div>
        <div>
          <h1>只讓對方看見</h1>
          <p>文字與照片都會先加密，再送進短暫郵筒。</p>
        </div>
      </div>

      <label class="field-label" for="displayName">我的名稱</label>
      <input id="displayName" class="text-input" type="text" maxlength="30" placeholder="例如：米米">

      <div id="friendsPanel" class="panel hidden">
        <div class="panel-title">常用私•話</div>
        <div id="friendsList" class="friends-list"></div>
      </div>

      <div class="panel settings-panel">
        <div class="panel-title">訊息時間</div>
        <div class="settings-list">
          <label class="setting-row">
            <span>未讀保留</span>
            <input id="messageTtlSeconds" class="seconds-input" type="number" inputmode="numeric" min="5" max="21600" step="5" value="20">
            <em>秒</em>
          </label>
          <label class="setting-row">
            <span>未開封</span>
            <input id="sealedBubbleSeconds" class="seconds-input" type="number" inputmode="numeric" min="10" max="600" step="1" value="120">
            <em>秒</em>
          </label>
          <label class="setting-row">
            <span>查看後</span>
            <input id="displaySeconds" class="seconds-input" type="number" inputmode="numeric" min="3" max="60" step="1" value="5">
            <em>秒</em>
          </label>
        </div>
        <p class="panel-note">按住橘點才會顯示內容；放開立即遮蔽。</p>
      </div>

      <div class="main-actions">
        <button id="createInviteBtn" class="primary-btn" type="button">建立加好友連結</button>
        <button id="healthBtn" class="soft-btn" type="button">測試連線</button>
      </div>

      <div id="invitePanel" class="panel invite-panel hidden">
        <div class="panel-title">加好友連結</div>
        <textarea id="inviteLink" readonly></textarea>
        <div class="main-actions compact-actions">
          <button id="copyInviteBtn" class="primary-btn" type="button">複製連結</button>
          <button id="openChatBtn" class="soft-btn" type="button">進入私•話</button>
        </div>
      </div>
    </section>

    <section class="setup-card hidden" id="acceptView">
      <div class="setup-head">
        <div class="logo-mark">私•話</div>
        <div>
          <h1>加入這段私•話</h1>
          <p>輸入名稱後即可建立固定的雙向密封頻道。</p>
        </div>
      </div>

      <label class="field-label" for="guestName">我的名稱</label>
      <input id="guestName" class="text-input" type="text" maxlength="30" placeholder="例如：米米">
      <button id="acceptInviteBtn" class="primary-btn full-btn" type="button">解鎖並加入</button>
    </section>

    <section class="chat-card hidden" id="chatView">
      <header class="chat-header">
        <div class="chat-title-row">
          <div class="chat-title-wrap">
            <span class="chat-logo">私•話</span>
            <div class="chat-name-wrap">
              <h2 id="chatTitle">私•話</h2>
              <p id="chatSub">端到端加密・讀取即刪</p>
            </div>
          </div>
          <div class="title-side">
            <div id="unreadBadge" class="unread-pill">0 未讀</div>
            <button id="resetBtn" class="leave-btn" type="button">離開</button>
          </div>
        </div>

        <div class="chat-tools">
          <button id="enableNotifyBtn" type="button">通知</button>
          <button id="readUnreadBtn" type="button">收訊</button>
          <button id="clearNowBtn" type="button">淨空</button>
          <button id="saveFriendBtn" type="button">常用</button>
        </div>
      </header>

      <div id="installBox" class="install-box hidden">
        <div>
          <strong>加入主畫面</strong>
          <p id="installText">像 App 一樣直接開啟。</p>
        </div>
        <div class="install-actions">
          <button id="installBtn" type="button">加入</button>
          <button id="dismissInstallBtn" type="button">略過</button>
        </div>
      </div>

      <div id="chatBox" class="chat-box"></div>

      <form id="messageForm" class="composer">
        <input id="photoInput" type="file" accept="image/*" hidden>
        <button id="photoBtn" class="photo-btn" type="button" aria-label="傳送照片">照片</button>
        <input id="messageInput" type="text" maxlength="1000" autocomplete="off" placeholder="輸入訊息…">
        <button class="send-btn" type="submit">送出</button>
      </form>
    </section>

    <div id="statusBar" class="status-bar">準備就緒</div>
  </main>

  <div class="privacy-cover" aria-hidden="true">已遮蔽</div>
  <script src="/app.js"></script>
</body>
</html>
