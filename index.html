<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b2a5b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="私・話">
  <title>私・話</title>

  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./assets/icon-192.png">
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="./layout-addon.css">

  <style id="interaction-fix">
    html,
    body {
      touch-action: manipulation;
      -webkit-user-select: auto;
      user-select: auto;
    }

    /* 首頁／接受邀請頁永遠放在最上層，任何通話或聊天室附加元件都不能吃掉點擊。 */
    body:not(.chat-active) .app-shell {
      z-index: 2147483000 !important;
      pointer-events: auto !important;
    }

    body:not(.chat-active) > .call-overlay,
    body:not(.chat-active) > .voice-call-mini-bar,
    body:not(.chat-active) > .room-toast,
    body:not(.chat-active) > .privacy-cover {
      display: none !important;
      pointer-events: none !important;
    }

    #setupView,
    #acceptView,
    #chatView {
      position: relative;
      pointer-events: auto !important;
    }

    #setupView,
    #acceptView {
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
    }

    #setupView *,
    #acceptView *,
    #chatView input,
    #chatView textarea,
    #chatView select,
    #chatView button {
      pointer-events: auto;
    }

    #setupView input,
    #setupView textarea,
    #setupView select,
    #setupView button,
    #acceptView input,
    #acceptView textarea,
    #acceptView select,
    #acceptView button {
      position: relative;
      z-index: 3;
      touch-action: manipulation;
    }

    #setupView::before,
    #setupView::after,
    #acceptView::before,
    #acceptView::after {
      pointer-events: none !important;
    }

    .button-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .ghost-btn {
      min-height: 44px;
      border-radius: 14px;
      padding: 10px 12px;
      background: #e8edf5;
      color: #0b2348;
      font-weight: 900;
    }

    .wide { width: 100%; }

    .settings-card {
      margin-top: 12px;
      padding: 13px;
      border: 1px solid #dfe4ec;
      border-radius: 17px;
      background: #f1f4f8;
    }

    @media (max-width: 430px) {
      .settings-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <section class="setup-card" id="setupView">
      <header class="setup-head">
        <div class="logo-mark" aria-hidden="true">私・話</div>
        <div>
          <h1>一次性連結<br>加入私・話</h1>
          <p>只交換加密密封包，不保存名稱或訊息明文。</p>
        </div>
      </header>

      <label class="field-label" for="displayName">我的顯示名稱</label>
      <input id="displayName" class="text-input" type="text" maxlength="30" autocomplete="nickname" placeholder="例如：Lisa、小藍">

      <div id="friendsPanel" class="panel friends-panel hidden">
        <div class="panel-title">常用 / 好友</div>
        <div id="friendsList" class="friends-list"></div>
        <p class="panel-note">常用只存在這台裝置，不會同步到其他手機，也不會產生聊天紀錄。</p>
      </div>

      <div class="panel settings-panel settings-card compact-settings">
        <div class="panel-title">秒數設定</div>
        <div class="settings-list">
          <label class="setting-row">
            <span>未進房保留</span>
            <input id="messageTtlSeconds" class="seconds-input" type="number" inputmode="numeric" min="60" max="21600" step="300" value="21600">
            <em>最長 6 小時</em>
          </label>

          <label class="setting-row">
            <span>進房後未開</span>
            <input id="sealedBubbleSeconds" class="seconds-input" type="number" inputmode="numeric" min="300" max="300" step="1" value="300" readonly>
            <em>固定 5 分鐘</em>
          </label>

          <label class="setting-row">
            <span>點開後消失</span>
            <input id="displaySeconds" class="seconds-input" type="number" inputmode="numeric" min="15" max="60" step="5" value="20">
            <em>雙方同步</em>
          </label>

          <label class="setting-row">
            <span>邀請有效</span>
            <input id="inviteTtlSeconds" class="seconds-input" type="number" inputmode="numeric" min="30" max="21600" step="10" value="1800">
            <em>預設 30 分鐘</em>
          </label>
        </div>
        <p class="panel-note">建立邀請時會同步閱後秒數；未讀進房後會顯示成一顆一顆的水滴。</p>
      </div>

      <div class="main-actions button-row">
        <button id="createInviteBtn" class="primary-btn" type="button">建立專屬對話</button>
        <button id="healthBtn" class="soft-btn ghost-btn" type="button">測試後端</button>
      </div>

      <div id="invitePanel" class="panel invite-panel hidden">
        <div class="panel-title">邀請連結</div>
        <textarea id="inviteLink" readonly aria-label="邀請連結"></textarea>
        <div class="main-actions compact-actions button-row">
          <button id="copyInviteBtn" class="primary-btn" type="button">複製邀請連結</button>
          <button id="openChatBtn" class="soft-btn ghost-btn" type="button">進入對話</button>
        </div>
        <p class="panel-note">請確認複製時包含網址最後面的 #angkey；一次性邀請被接受後會立即失效。</p>
      </div>
    </section>

    <section class="setup-card hidden" id="acceptView">
      <header class="setup-head">
        <div class="logo-mark" aria-hidden="true">邀請</div>
        <div>
          <h1>正在加入私・話</h1>
          <p>完整邀請連結會帶有 #angkey，本機會用它解開密封訊息。</p>
        </div>
      </header>

      <label class="field-label" for="guestName">我的顯示名稱</label>
      <input id="guestName" class="text-input" type="text" maxlength="30" autocomplete="nickname" placeholder="例如：Lisa、小藍">
      <button id="acceptInviteBtn" class="primary-btn full-btn wide" type="button">接受密封邀請並加入</button>
    </section>

    <section class="chat-card hidden" id="chatView">
      <header class="chat-header">
        <div>
          <div class="brand-pill small">私・話</div>
          <h2 id="chatTitle">密封對話</h2>
          <p id="chatSub" class="small-muted">未進房加密等待｜進房後未開 5 分鐘｜點開後限時消失。</p>
          <div id="unreadBadge" class="unread-pill">無未讀</div>
        </div>
        <div class="header-actions">
          <button id="enableNotifyBtn" class="icon-btn" type="button">通知</button>
          <button id="readUnreadBtn" class="icon-btn" type="button">讀取</button>
          <button id="clearNowBtn" class="icon-btn danger-soft" type="button">立即刪</button>
          <button id="saveFriendBtn" class="icon-btn" type="button">加常用</button>
          <button id="resetBtn" class="icon-btn" type="button">重置</button>
        </div>
      </header>

      <div id="installBox" class="install-box hidden">
        <div>
          <strong>可以加入主畫面</strong>
          <p id="installText">加入主畫面後，下次可以像 App 一樣直接開啟這個對話。</p>
        </div>
        <div class="install-actions button-row">
          <button id="installBtn" class="primary-btn" type="button">安裝</button>
          <button id="dismissInstallBtn" class="ghost-btn" type="button">稍後</button>
        </div>
      </div>

      <div id="chatBox" class="chat-box"></div>

      <form id="messageForm" class="composer">
        <input id="photoInput" type="file" accept="image/*" hidden>
        <button id="photoBtn" class="photo-btn" type="button">照片</button>
        <input id="messageInput" type="text" maxlength="1000" autocomplete="off" placeholder="輸入私・話...">
        <button class="send-btn" type="submit">送出</button>
      </form>
    </section>

    <div id="statusBar" class="status-bar" role="status" aria-live="polite">準備好了</div>
  </main>

  <script>
    (() => {
      const loaded = new Set();

      function loadScript(src) {
        if (loaded.has(src) || document.querySelector(`script[data-lazy-src="${src}"]`)) {
          return Promise.resolve();
        }
        loaded.add(src);
        return new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.src = src;
          script.dataset.lazySrc = src;
          script.onload = resolve;
          script.onerror = reject;
          document.body.appendChild(script);
        });
      }

      async function loadChatAddonsWhenNeeded() {
        const chat = document.getElementById('chatView');
        if (!chat || chat.classList.contains('hidden')) return;
        document.body.classList.add('chat-active');
        try {
          await loadScript('./room-addon.js');
          await loadScript('./call-addon.js');
        } catch (error) {
          const status = document.getElementById('statusBar');
          if (status) status.textContent = '聊天室附加功能載入失敗，請重新整理。';
        }
      }

      function keepSetupInteractive() {
        const chat = document.getElementById('chatView');
        const isChat = Boolean(chat && !chat.classList.contains('hidden'));
        document.body.classList.toggle('chat-active', isChat);
        if (!isChat) {
          document.body.classList.remove('privacy-hidden', 'keyboard-open');
          document.querySelectorAll('.call-overlay, .voice-call-mini-bar, .room-toast').forEach((element) => element.remove());
        }
      }

      document.addEventListener('DOMContentLoaded', () => {
        const chat = document.getElementById('chatView');
        if (chat) {
          const observer = new MutationObserver(() => {
            keepSetupInteractive();
            loadChatAddonsWhenNeeded();
          });
          observer.observe(chat, { attributes: true, attributeFilter: ['class'] });
        }
        keepSetupInteractive();
        loadChatAddonsWhenNeeded();
      }, { once: true });

      window.addEventListener('pageshow', keepSetupInteractive);
      window.addEventListener('focus', keepSetupInteractive);
      document.addEventListener('visibilitychange', () => {
        if (!document.hidden) keepSetupInteractive();
      });
    })();
  </script>

  <script src="./app.js"></script>
  <script src="./invite-addon.js"></script>
</body>
</html>
