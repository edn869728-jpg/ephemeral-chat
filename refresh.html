<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0b2a5b">
  <title>私・話更新</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,"Noto Sans TC",sans-serif;background:#07162f;color:#fff}body{display:grid;place-items:center;min-height:100dvh;padding:24px}.card{width:min(100%,420px);padding:28px 22px;border:1px solid rgba(255,255,255,.16);border-radius:24px;background:#0b2348;text-align:center;box-shadow:0 24px 70px rgba(0,0,0,.35)}h1{margin:0 0 10px;font-size:25px}p{margin:0;color:rgba(255,255,255,.72);line-height:1.6}.dot{width:46px;height:46px;margin:0 auto 18px;border:5px solid rgba(255,255,255,.18);border-top-color:#ff7a1a;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <main class="card">
    <div class="dot" aria-hidden="true"></div>
    <h1>正在更新私・話</h1>
    <p id="status">清除舊快取並載入互動修正版…</p>
  </main>
  <script>
    (async () => {
      const status = document.getElementById('status');
      try {
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }
        status.textContent = '更新完成，正在重新開啟…';
      } catch (_) {
        status.textContent = '正在重新開啟最新版…';
      }
      setTimeout(() => location.replace('./?v=445fix-' + Date.now()), 700);
    })();
  </script>
</body>
</html>
